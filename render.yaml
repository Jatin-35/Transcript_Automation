services:
  - type: web
    name: transcriptai-web
    env: node
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcriptai-db
          property: connectionString
      - key: SONIOX_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-mini
      - key: OPENAI_API_VERSION
        value: "2024-12-01-preview"
      - key: GOOGLE_API_KEY
        sync: false
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: TEMP_DIR
        value: /var/data/temp
      - key: NODE_ENV
        value: production

  - type: worker
    name: transcriptai-worker
    env: node
    buildCommand: npm install && npm run db:generate && npx tsc -p tsconfig.worker.json
    startCommand: node worker/dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transcriptai-db
          property: connectionString
      - key: SONIOX_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-mini
      - key: OPENAI_API_VERSION
        value: "2024-12-01-preview"
      - key: GOOGLE_API_KEY
        sync: false
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: TEMP_DIR
        value: /var/data/temp
      - key: NODE_ENV
        value: production

databases:
  - name: transcriptai-db
    plan: free
